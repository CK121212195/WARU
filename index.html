<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メンナク風 名言ジェネレーター</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- QRCode.js (インボイス表示用) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- html2canvas (画像合成用) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Google Fonts (メンナク風の極太明朝体) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@900&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: sans-serif; }
        
        /* メンナク風テキストのベーススタイル */
        .mennaku-text {
            font-family: 'Noto Serif JP', serif;
            font-weight: 900;
            color: #ffffff;
            /* 派手な縁取りとドロップシャドウ */
            text-shadow: 
                3px 3px 0 #000, -3px -3px 0 #000, 
                3px -3px 0 #000, -3px 3px 0 #000,
                0 0 10px rgba(255,165,0,0.8),
                5px 5px 15px rgba(0,0,0,0.9);
            letter-spacing: 0.1em;
            line-height: 1.2;
            pointer-events: none; /* テキストが画像の邪魔をしないように */
            font-size: clamp(1.5rem, 6vw, 3rem); /* 画像サイズに合わせて可変 */
        }
        .text-color-orange { color: #ffaa00; }
        .text-color-white { color: #ffffff; }

        /* 配置用クラス（JSでランダム付与） */
        .pos-top { top: 5%; left: 50%; transform: translateX(-50%); writing-mode: horizontal-tb; width: 90%; text-align: center; }
        .pos-bottom { bottom: 5%; left: 50%; transform: translateX(-50%); writing-mode: horizontal-tb; width: 90%; text-align: center; }
        .pos-left { top: 50%; left: 5%; transform: translateY(-50%); writing-mode: vertical-rl; height: 90%; text-align: center; text-orientation: upright; }
        .pos-right { top: 50%; right: 5%; transform: translateY(-50%); writing-mode: vertical-rl; height: 90%; text-align: center; text-orientation: upright; }

        /* カスタムスクロールバー等 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center py-10 relative">

    <div class="max-w-2xl w-full px-4 flex flex-col items-center">
        <!-- ヘッダー -->
        <h1 class="text-4xl md:text-5xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-yellow-300 text-center filter drop-shadow-lg">
            伊達ワル名言ジェネレーター
        </h1>
        <p class="text-slate-400 mb-8 text-center text-sm md:text-base">アップロードした画像に、魂を震わせる「あの名言」を刻み込め。</p>

        <!-- 画像アップロードエリア -->
        <label for="imageInput" class="cursor-pointer bg-slate-800 hover:bg-slate-700 border-2 border-dashed border-slate-600 rounded-xl p-8 w-full text-center transition-all duration-300 mb-6 group">
            <i class="fa-solid fa-cloud-arrow-up text-4xl text-orange-500 mb-3 group-hover:scale-110 transition-transform"></i>
            <p class="font-bold">ここをタップして画像を選択</p>
            <p class="text-xs text-slate-500 mt-2">※画像はサーバーに送信されず、ブラウザ上でのみ処理されます</p>
            <input type="file" id="imageInput" accept="image/*" class="hidden">
        </label>

        <!-- プレビューコンテナ（html2canvasの撮影対象） -->
        <div id="preview-container" class="relative hidden max-w-full rounded-lg overflow-hidden shadow-2xl shadow-black/50 border border-slate-700 bg-black">
            <img id="preview-img" class="w-full h-auto block" alt="プレビュー画像">
            <!-- ここにJSで名言が挿入されます -->
            <div id="quote-text" class="mennaku-text absolute hidden"></div>
        </div>

        <!-- アクションボタン -->
        <div id="action-area" class="mt-8 hidden w-full flex flex-col items-center">
            <p class="text-slate-300 mb-3 font-bold" id="price-display">残り無料枠: <span id="free-count" class="text-emerald-400">3</span>回</p>
            <button id="btn-generate" class="w-full md:w-2/3 py-4 rounded-full font-black text-xl bg-gradient-to-r from-orange-600 to-amber-500 hover:from-orange-500 hover:to-amber-400 shadow-[0_0_20px_rgba(245,158,11,0.4)] transition-all duration-300 hover:scale-105 active:scale-95 text-white">
                <i class="fa-solid fa-bolt mr-2"></i>名言を付与する
            </button>
        </div>
    </div>

    <!-- 決済用モーダル (LNbits) -->
    <div id="payment-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="bg-slate-800 p-8 rounded-2xl max-w-sm w-full border border-slate-600 text-center shadow-2xl relative transform scale-95 transition-transform duration-300" id="payment-modal-content">
            <button id="btn-close-payment" class="absolute top-4 right-4 text-slate-400 hover:text-white text-xl"><i class="fa-solid fa-xmark"></i></button>
            <h2 class="text-2xl font-black text-amber-500 mb-2">100 SATS</h2>
            <p class="text-slate-300 text-sm mb-6">以下のQRコードをLightningウォレットでスキャンして支払いを完了してください。</p>
            
            <div class="bg-white p-4 rounded-xl inline-block mb-4">
                <div id="qrcode"></div>
            </div>
            
            <p class="text-xs text-slate-400 break-all mb-4" id="invoice-text">lnbc...</p>
            
            <div id="payment-status" class="flex flex-col items-center justify-center h-12">
                <i class="fa-solid fa-circle-notch fa-spin text-2xl text-amber-500 mb-2"></i>
                <span class="text-sm font-bold text-slate-300">支払い待機中...</span>
            </div>
        </div>
    </div>

    <!-- 結果表示モーダル -->
    <div id="result-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-50 hidden flex flex-col items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <h2 class="text-3xl font-black text-white mb-6 animate-pulse">✨ 降臨 ✨</h2>
        <div class="relative max-w-full max-h-[60vh] overflow-hidden rounded-lg shadow-[0_0_30px_rgba(255,165,0,0.3)] mb-8">
            <img id="result-img" class="max-w-full max-h-[60vh] object-contain">
        </div>
        <div class="flex gap-4">
            <button id="btn-download" class="px-6 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-lg font-bold text-white transition-colors">
                <i class="fa-solid fa-download mr-2"></i>画像を保存
            </button>
            <button id="btn-close-result" class="px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg font-bold text-white transition-colors">
                閉じる
            </button>
        </div>
    </div>

    <script>
        // ==========================================
        // 設定・APIキー (ご提示いただいたLNbits環境)
        // ==========================================
        const LNBITS_URL = "https://demo.lnbits.com";
        const INVOICE_READ_KEY = "67e5b0ad270f44d19e6d768bb3314e49";
        const PRICE_SATS = 100;
        const TOTAL_FREE_SPINS = 3;

        // 名言リスト（裏で10000種類あっても配列なら一瞬で読み込めます）
        // ※とりあえずデモ用に代表的なものを入れています
        const MEIGEN_LIST = [
            "ガイアが俺にもっと輝けと囁いている",
            "ストリートで死ぬために生まれてきたのかもしれない",
            "エレガントに舞い、クレイジーに酔う",
            "俺のフェザーから鳥人拳を繰り出す！",
            "伊達ワルな才能 誰もが嫉妬する俺",
            "連覇を見据えて動き出したキングの後半戦",
            "常識をぶった斬れ！最高は自分で掴むモノ！",
            "時代が俺に追いついてきた",
            "どれだけ背伸びしても、届かない空がある",
            "神は俺に二つのものを与えた。美貌と、そして……",
            "俺の行く道が、すなわち最前線",
            "月明かりより鋭く、太陽より熱く"
            // TODO: ここに残り9988個を追加できます
        ];

        // 状態管理
        let freeSpinsUsed = parseInt(localStorage.getItem('mennakuFreeSpinsUsed')) || 0;
        let pollInterval = null;
        let activePaymentHash = null;

        // DOM要素
        const imageInput = document.getElementById('imageInput');
        const previewContainer = document.getElementById('preview-container');
        const previewImg = document.getElementById('preview-img');
        const actionArea = document.getElementById('action-area');
        const freeCountSpan = document.getElementById('free-count');
        const btnGenerate = document.getElementById('btn-generate');

        // UI初期化
        function updatePriceUI() {
            let freeSpinsLeft = Math.max(0, TOTAL_FREE_SPINS - freeSpinsUsed);
            if (freeSpinsLeft > 0) {
                freeCountSpan.textContent = freeSpinsLeft;
                freeCountSpan.className = "text-emerald-400 text-xl font-bold";
                btnGenerate.innerHTML = `<i class="fa-solid fa-bolt mr-2"></i>無料で名言を付与する`;
            } else {
                document.getElementById('price-display').innerHTML = `<i class="fa-solid fa-coins text-amber-500 mr-1"></i>料金: <span class="text-amber-500 font-bold text-xl">${PRICE_SATS} SATS</span>`;
                btnGenerate.innerHTML = `<i class="fa-solid fa-bolt mr-2"></i>${PRICE_SATS} SATS で付与する`;
            }
        }
        updatePriceUI();

        // 1. 画像アップロード処理
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                previewImg.src = event.target.result;
                previewContainer.classList.remove('hidden');
                actionArea.classList.remove('hidden');
                // 前回の名言が残っていれば隠す
                document.getElementById('quote-text').style.display = 'none';
                
                // 画像読み込み後にコンテナの高さを調整するため少し待つ
                setTimeout(() => {
                    window.scrollTo({ top: actionArea.offsetTop - 50, behavior: 'smooth' });
                }, 100);
            };
            reader.readAsDataURL(file);
        });

        // 2. ボタン押下処理 (決済分岐)
        btnGenerate.addEventListener('click', async () => {
            let freeSpinsLeft = Math.max(0, TOTAL_FREE_SPINS - freeSpinsUsed);
            
            if (freeSpinsLeft > 0) {
                // 無料枠消費
                freeSpinsUsed++;
                localStorage.setItem('mennakuFreeSpinsUsed', freeSpinsUsed);
                updatePriceUI();
                executeGeneration();
            } else {
                // 有料枠 (LNbits インボイス発行)
                showPaymentModal();
            }
        });

        // 3. LNbits インボイス発行とモーダル表示
        async function showPaymentModal() {
            const modal = document.getElementById('payment-modal');
            const qrContainer = document.getElementById('qrcode');
            const statusArea = document.getElementById('payment-status');
            
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.add('opacity-100'), 10);
            
            qrContainer.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-slate-500 text-3xl my-8"></i>';
            document.getElementById('invoice-text').textContent = "インボイス生成中...";

            try {
                // APIに請求書作成をリクエスト
                const response = await fetch(`${LNBITS_URL}/api/v1/payments`, {
                    method: 'POST',
                    headers: { 
                        'X-Api-Key': INVOICE_READ_KEY, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({ 
                        out: false, 
                        amount: PRICE_SATS, 
                        memo: "伊達ワル名言ジェネレーター", 
                        unit: "sat" 
                    })
                });

                if (!response.ok) throw new Error("インボイスの生成に失敗しました");
                const data = await response.json();
                
                activePaymentHash = data.payment_hash;
                const invoice = data.payment_request;

                // QRコード描画
                qrContainer.innerHTML = "";
                new QRCode(qrContainer, { 
                    text: invoice, 
                    width: 200, 
                    height: 200, 
                    colorDark: "#000000", 
                    colorLight: "#ffffff", 
                    correctLevel: QRCode.CorrectLevel.M 
                });
                
                document.getElementById('invoice-text').textContent = invoice.substring(0, 30) + "...";

                // ポーリング監視開始
                startPolling(activePaymentHash);

            } catch (error) {
                alert(error.message);
                closePaymentModal();
            }
        }

        // 4. 支払い状態のポーリング監視
        function startPolling(paymentHash) {
            if (pollInterval) clearInterval(pollInterval);
            
            pollInterval = setInterval(async () => {
                try {
                    const response = await fetch(`${LNBITS_URL}/api/v1/payments/${paymentHash}`, {
                        headers: { 'X-Api-Key': INVOICE_READ_KEY }
                    });
                    const data = await response.json();
                    
                    if (data.paid) {
                        // 支払い完了！
                        clearInterval(pollInterval);
                        document.getElementById('payment-status').innerHTML = '<i class="fa-solid fa-circle-check text-emerald-500 text-2xl mb-2"></i><span class="text-emerald-500 font-bold">支払い完了！</span>';
                        
                        // モーダルを閉じて画像生成へ
                        setTimeout(() => {
                            closePaymentModal();
                            executeGeneration();
                        }, 1000);
                    }
                } catch (err) {
                    console.error("Payment check error:", err);
                }
            }, 2000); // 2秒ごとに確認
        }

        function closePaymentModal() {
            if (pollInterval) clearInterval(pollInterval);
            const modal = document.getElementById('payment-modal');
            modal.classList.remove('opacity-100');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }
        document.getElementById('btn-close-payment').addEventListener('click', closePaymentModal);

        // 5. メインの合成処理（html2canvas）
        async function executeGeneration() {
            // ローディングUI等を出しても良いが、一瞬なので直接処理
            const quoteEl = document.getElementById('quote-text');
            
            // 名言をランダム選択
            const meigen = MEIGEN_LIST[Math.floor(Math.random() * MEIGEN_LIST.length)];
            
            // 色をランダム（オレンジ or 白）
            const colorClass = Math.random() > 0.5 ? 'text-color-orange' : 'text-color-white';
            
            // 配置をランダム選択（上下は横書き、左右は縦書き）
            const posClasses = ['pos-top', 'pos-bottom', 'pos-left', 'pos-right'];
            const selectedPos = posClasses[Math.floor(Math.random() * posClasses.length)];

            // クラスとテキストを適用して表示
            quoteEl.className = `mennaku-text absolute ${selectedPos} ${colorClass}`;
            // 改行がある場合は <br> に変換する処理を入れても良いですが、今回はそのまま
            quoteEl.innerHTML = meigen; 
            quoteEl.style.display = 'block';

            // フォントやレイアウトのレンダリングを待つための微小なディレイ
            await new Promise(resolve => setTimeout(resolve, 200));

            // html2canvasでコンテナ全体をキャプチャ
            try {
                const canvas = await html2canvas(previewContainer, {
                    scale: 2, // 高画質化
                    useCORS: true,
                    backgroundColor: null
                });

                // 結果をモーダルに表示
                const resultDataUrl = canvas.toDataURL('image/png');
                document.getElementById('result-img').src = resultDataUrl;
                
                // ダウンロードボタンに設定
                const btnDownload = document.getElementById('btn-download');
                btnDownload.onclick = () => {
                    const link = document.createElement('a');
                    link.download = `datewaru_${Date.now()}.png`;
                    link.href = resultDataUrl;
                    link.click();
                };

                // 結果モーダルを表示
                const resultModal = document.getElementById('result-modal');
                resultModal.classList.remove('hidden');
                setTimeout(() => resultModal.classList.add('opacity-100'), 10);

            } catch (error) {
                console.error("Canvas generation failed:", error);
                alert("画像の合成に失敗しました。");
            } finally {
                // プレビュー側のテキストは再度隠しておく（次回の為）
                quoteEl.style.display = 'none';
            }
        }

        // 結果モーダルを閉じる
        document.getElementById('btn-close-result').addEventListener('click', () => {
            const modal = document.getElementById('result-modal');
            modal.classList.remove('opacity-100');
            setTimeout(() => modal.classList.add('hidden'), 300);
        });

    </script>
</body>
</html>

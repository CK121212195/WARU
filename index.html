<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メンナク風 名言ジェネレーター</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background-color: #111; color: #fff;}
        #preview { width: 300px; height: 300px; border: 2px dashed #666; margin: 20px auto; background-color: #222; display: flex; align-items: center; justify-content: center;}
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .generate-btn { background-color: #ff007f; color: white; border: none; }
        #paywall { display: none; margin-top: 20px; padding: 20px; background: #333; border-radius: 8px; }
        .sats-btn { background-color: #f7931a; color: white; border: none; margin-top: 10px;}
    </style>
</head>
<body>

    <h1>メンナク風 名言ジェネレーター</h1>
    <p>残り無料回数: <span id="free-count">3</span>回</p>

    <input type="file" id="imageInput" accept="image/*">
    <br><br>
    
    <div id="preview">
        ここに画像と名言が合成されます
    </div>

    <button id="mainBtn" class="generate-btn" onclick="handleGenerateClick()">名言を付与する</button>

    <!-- 課金用エリア -->
    <div id="paywall">
        <h3>無料枠（3回）を使い切りました！</h3>
        <p>引き続き利用するには 100 sats のお支払いが必要です。</p>
        <button class="sats-btn" onclick="payWithLightning()">⚡ 100 sats 支払って生成する</button>
        <p id="payment-status" style="color: yellow; font-size: 14px;"></p>
    </div>

    <script>
        const LN_ADDRESS = 'brashridge65@walletofsatoshi.com';
        const PRICE_SATS = 100;
        const FREE_LIMIT = 3;

        // 初期化処理：ローカルストレージから使用回数を取得
        let usageCount = parseInt(localStorage.getItem('mennakuUsageCount')) || 0;
        updateDisplay();

        function updateDisplay() {
            let remaining = Math.max(0, FREE_LIMIT - usageCount);
            document.getElementById('free-count').innerText = remaining;
            
            if (usageCount >= FREE_LIMIT) {
                document.getElementById('mainBtn').style.display = 'none';
                document.getElementById('paywall').style.display = 'block';
            }
        }

        // メインの生成ボタンが押された時
        function handleGenerateClick() {
            if (usageCount < FREE_LIMIT) {
                usageCount++;
                localStorage.setItem('mennakuUsageCount', usageCount);
                updateDisplay();
                generateImage(); // 画像生成処理へ
            }
        }

        // Lightning決済処理 (LNURL-pay & WebLN)
        async function payWithLightning() {
            const statusText = document.getElementById('payment-status');
            statusText.innerText = "インボイスを生成中...";

            try {
                // 1. Lightning AddressをLNURLのURL形式に変換
                const [username, domain] = LN_ADDRESS.split('@');
                const lnurlEndpoint = `https://${domain}/.well-known/lnurlp/${username}`;

                // 2. Wallet of Satoshi のサーバーから決済情報を取得
                // ※注意: 静的サイトからの直接API呼び出しは、CORSエラーになる場合があります。
                const response = await fetch(lnurlEndpoint);
                const lnurlData = await response.json();

                if (lnurlData.status === "ERROR") throw new Error(lnurlData.reason);

                // 3. 100 sats (100,000 millisats) のインボイスを要求
                const millisats = PRICE_SATS * 1000;
                const callbackUrl = `${lnurlData.callback}?amount=${millisats}`;
                const invoiceResponse = await fetch(callbackUrl);
                const invoiceData = await invoiceResponse.json();

                if (invoiceData.status === "ERROR") throw new Error(invoiceData.reason);
                const invoice = invoiceData.pr; // BOLT11 インボイス

                // 4. WebLN (Alby等のブラウザ拡張) を使って支払い画面を呼び出す
                if (typeof window.webln !== 'undefined') {
                    await window.webln.enable();
                    statusText.innerText = "ウォレットで支払いを承認してください...";
                    const result = await window.webln.sendPayment(invoice);
                    
                    // 支払い成功！
                    statusText.innerText = "支払い完了！ありがとうございます。";
                    setTimeout(() => {
                        document.getElementById('paywall').style.display = 'none';
                        generateImage(); // 画像生成処理へ
                    }, 1500);

                } else {
                    // WebLNがない場合は、lightning: リンクでスマホ等のウォレットを開かせる
                    statusText.innerHTML = `ウォレットアプリが検知できませんでした。<br><a href="lightning:${invoice}" style="color:white;">ここをタップしてウォレットを開いてください</a><br>※静的サイトの仕様上、支払い完了の自動検知ができません。`;
                }

            } catch (error) {
                console.error(error);
                statusText.innerText = "エラーが発生しました: " + error.message;
            }
        }

        // --- 画像と名言の合成処理（モック） ---
        function generateImage() {
            // ここに、前回の回答で説明した html2canvas 等を使った
            // 名言のランダム取得＆画像合成の処理を書きます。
            const preview = document.getElementById('preview');
            preview.innerHTML = "<h2 style='color: orange; text-shadow: 2px 2px 0 #000;'>ガイアが俺に<br>もっと輝けと囁いている</h2>";
            alert("名言画像を生成しました！（デモ）");
        }
    </script>
</body>
</html>

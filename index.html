<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ワル【極悪】Bitcoin ～千のキャッチコピーより残酷な俺という説得力～</title>
    
    <!-- Tailwind CSS (ベースのスタイル用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- html2canvas (魔法の画像合成ライブラリ) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- 魂のフォント (Noto Serif JP: 極太明朝) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@900&display=swap" rel="stylesheet">
    
    <!-- アイコン (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* =========================================
           俺というSATOSHIを表現する極悪スタイル
        ========================================= */
        body {
            font-family: 'Noto Serif JP', serif;
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 0, 0, 0.1), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 215, 0, 0.1), transparent 25%);
            color: #fff;
            overflow-x: hidden;
        }

        /* ギラギラ輝くタイトル */
        .gira-title {
            background: linear-gradient(to bottom, #fff 0%, #d4af37 50%, #8a6d1c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.8));
            letter-spacing: -2px;
        }

        /* サブタイトル (赤黒いオーラ) */
        .aura-subtitle {
            color: #ff3333;
            text-shadow: 2px 2px 0 #000, 0 0 15px rgba(255, 0, 0, 0.8);
            letter-spacing: 2px;
        }

        /* 画像合成用の名言テキスト (本家リスペクトの極太装飾) */
        .mennaku-text {
            font-family: 'Noto Serif JP', serif;
            font-weight: 900;
            color: #ffffff;
            /* 悪魔的ドロップシャドウ＆縁取り */
            text-shadow: 
                4px 4px 0 #000, -4px -4px 0 #000, 
                4px -4px 0 #000, -4px 4px 0 #000,
                0 0 15px rgba(255,255,255,0.8),
                8px 8px 20px rgba(0,0,0,0.9);
            letter-spacing: 0.15em;
            line-height: 1.1;
            pointer-events: none;
            font-size: clamp(2rem, 8vw, 4.5rem);
            z-index: 10;
        }
        /* バリエーション（ネオンイエロー） */
        .text-color-gold { 
            color: #ffe600; 
            text-shadow: 4px 4px 0 #000, -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000, 0 0 15px rgba(255,230,0,0.8), 8px 8px 20px rgba(0,0,0,0.9);
        }

        /* 配置クラス (ランダムで付与) */
        .pos-top { top: 5%; left: 50%; transform: translateX(-50%); writing-mode: horizontal-tb; width: 95%; text-align: center; }
        .pos-bottom { bottom: 5%; left: 50%; transform: translateX(-50%); writing-mode: horizontal-tb; width: 95%; text-align: center; }
        .pos-left { top: 50%; left: 3%; transform: translateY(-50%); writing-mode: vertical-rl; height: 95%; text-align: center; text-orientation: upright; }
        .pos-right { top: 50%; right: 3%; transform: translateY(-50%); writing-mode: vertical-rl; height: 95%; text-align: center; text-orientation: upright; }

        /* オラオラ系ボタン */
        .ora-btn {
            background: linear-gradient(135deg, #8b0000 0%, #ff0000 50%, #8b0000 100%);
            background-size: 200% auto;
            color: white;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6), inset 0 0 10px rgba(0,0,0,0.5);
            border: 2px solid #ff6666;
            transition: 0.5s;
        }
        .ora-btn:hover {
            background-position: right center;
            box-shadow: 0 0 30px rgba(255, 0, 0, 1), inset 0 0 10px rgba(0,0,0,0.5);
            transform: scale(1.05);
        }
        .ora-btn:active { transform: scale(0.95); }

        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #8b0000; border-radius: 5px; }

        /* 脈打つアニメーション */
        @keyframes pulse-evil {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.02); }
        }
        .animate-evil { animation: pulse-evil 2s infinite; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 relative px-4">

    <!-- 背景の装飾 -->
    <div class="fixed top-0 left-0 w-full h-full pointer-events-none opacity-20 z-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>

    <div class="max-w-3xl w-full flex flex-col items-center relative z-10">
        
        <!-- ================= ヘッダー ================= -->
        <h1 class="text-5xl md:text-7xl font-black mb-2 gira-title text-center leading-tight">
            ワル<span class="text-4xl md:text-5xl text-red-600" style="-webkit-text-fill-color:#ff0000;">【極悪】</span>Bitcoin
        </h1>
        <p class="text-xl md:text-2xl font-bold mb-10 text-center aura-subtitle">
            ～千のキャッチコピーより残酷な俺という説得力～
        </p>

        <!-- ================= 画像アップロード ================= -->
        <label for="imageInput" class="cursor-pointer bg-black/60 border-4 border-red-900 hover:border-red-500 rounded-lg p-10 w-full text-center transition-all duration-300 mb-8 group shadow-[0_0_30px_rgba(255,0,0,0.2)] hover:shadow-[0_0_50px_rgba(255,0,0,0.5)]">
            <i class="fa-solid fa-camera-retro text-6xl text-gray-500 group-hover:text-red-500 mb-4 transition-colors"></i>
            <p class="text-2xl font-black text-gray-300 group-hover:text-white">ルクス（画像）を解放（アップ）する</p>
            <p class="text-sm text-gray-600 mt-3 font-sans">※俺とお前の秘密だ。サーバーには送んねぇから安心しな</p>
            <input type="file" id="imageInput" accept="image/*" class="hidden">
        </label>

        <!-- ================= プレビュー領域 ================= -->
        <div id="preview-container" class="relative hidden w-full rounded-sm overflow-hidden shadow-[0_0_50px_rgba(0,0,0,1)] border-2 border-gray-800 bg-black">
            <img id="preview-img" class="w-full h-auto block object-contain" alt="プレビュー">
            <!-- 名言が宿る場所 -->
            <div id="quote-text" class="mennaku-text absolute hidden"></div>
        </div>

        <!-- ================= アクションエリア ================= -->
        <div id="action-area" class="mt-10 hidden w-full flex flex-col items-center">
            <div class="mb-4 text-center">
                <p class="text-gray-400 font-bold text-lg">俺の慈悲（タダ）: 残り <span id="free-count" class="text-4xl text-red-500 mx-2 animate-evil">25</span> 回</p>
            </div>
            
            <button id="btn-generate" class="w-full md:w-4/5 py-5 rounded-full font-black text-2xl md:text-3xl ora-btn tracking-widest">
                <i class="fa-solid fa-fire-flame-curved mr-3"></i>魂の刻印を刻む
            </button>
        </div>
    </div>

    <!-- ================= 【極悪】お布施モーダル ================= -->
    <div id="payment-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 hidden flex items-center justify-center opacity-0 transition-opacity duration-500 px-4">
        <div class="bg-[#111] p-8 md:p-12 rounded-xl max-w-2xl w-full border-4 border-[#d4af37] text-center shadow-[0_0_100px_rgba(212,175,55,0.3)] relative" id="payment-modal-content">
            
            <h2 class="text-4xl font-black text-[#d4af37] mb-4 drop-shadow-lg">おいおい、タダ乗りはここまでだぜ？</h2>
            
            <p class="text-gray-300 text-lg mb-6 leading-relaxed">
                俺の慈悲（タダ）は25回で限界（カンスト）だ。<br>
                これ以上、俺の魂を震わせたいなら、<br>
                <span class="text-red-500 font-bold text-2xl">SATSで俺の心（ハート）を燃やしてくれよ！</span>
            </p>

            <div class="bg-black border border-gray-700 p-6 rounded-lg mb-6">
                <p class="text-sm text-gray-500 mb-2">▼ 俺へのリスペクト（寄付）アドレス ▼</p>
                <p class="text-xl md:text-3xl font-black text-white break-all select-all text-center" id="my-address">
                    brashridge65@walletofsatoshi.com
                </p>
                <button onclick="copyAddress()" class="mt-4 px-6 py-2 bg-gray-800 hover:bg-gray-700 text-white font-bold rounded text-sm transition">
                    <i class="fa-solid fa-copy mr-2"></i>アドレスをパクる（コピー）
                </button>
                <p id="copy-msg" class="text-green-500 text-sm mt-2 font-bold hidden">コピー完了！ウォレットにブチ込め！</p>
            </div>
            
            <p class="text-sm text-gray-500 mb-6 font-sans">
                ※システム上、送金の自動確認はできねぇ。<br>
                俺とお前の絆（トラスト）だ。送ったら下のボタンを押してくれ。ウソついたら地獄の果てまで追いつめるぜ？
            </p>

            <button id="btn-paid" class="w-full py-4 bg-gradient-to-r from-yellow-600 to-yellow-400 hover:from-yellow-500 hover:to-yellow-300 text-black font-black text-2xl rounded shadow-[0_0_20px_rgba(255,215,0,0.5)] transition-transform hover:scale-105">
                <i class="fa-brands fa-bitcoin mr-2"></i>SATSをブチ込んだぜ！（自己申告）
            </button>
        </div>
    </div>

    <!-- ================= 降臨（結果表示）モーダル ================= -->
    <div id="result-modal" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-50 hidden flex flex-col items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <h2 class="text-5xl font-black text-white mb-8 gira-title animate-evil">✨ 降 臨 ✨</h2>
        
        <div class="relative max-w-full md:max-w-[80vw] max-h-[60vh] overflow-hidden shadow-[0_0_50px_rgba(255,255,255,0.2)] mb-10 border border-gray-800">
            <img id="result-img" class="max-w-full max-h-[60vh] object-contain block mx-auto">
        </div>
        
        <div class="flex flex-col md:flex-row gap-6">
            <button id="btn-download" class="px-10 py-4 ora-btn rounded text-xl font-black min-w-[250px]">
                <i class="fa-solid fa-download mr-2"></i>画像を保存（キープ）する
            </button>
            <button id="btn-close-result" class="px-10 py-4 bg-gray-800 hover:bg-gray-700 border border-gray-600 rounded text-white text-xl font-bold transition-colors min-w-[250px]">
                閉じる
            </button>
        </div>
    </div>

    <script>
        // ==========================================
        // 魂の設定
        // ==========================================
        const MAX_FREE_SPINS = 25;
        const MY_LIGHTNING_ADDRESS = "brashridge65@walletofsatoshi.com";

        // 提供された本家名言リスト（全12発）
        const MEIGEN_LIST = [
            "ガイアが俺にもっと輝けと囁いている",
            "一つだけ言える真理がある。「男は黒に染まれ」",
            "知ってたか？孔雀は堕天使の象徴なんだぜ",
            "磨き上げた己に伊達ワルの神は裏切らない",
            "イケメン×伊達ワル 激モテの回答完了。",
            "3秒だ。野郎を倒すのも女をオトすのもな",
            "千の言葉より残酷な俺という説得力",
            "今宵は俺のナイトメアで酔えばいい！",
            "すでにオレの魅力に耐えられない？悪いがオレは変身をあと2回も残している",
            "オレの影武者もあっちで大統領頑張ってるみたいだな",
            "俺の行き先？あの太陽にでも聞いてくれ",
            "AKBとか知らないけど、たぶん全部抱いたぜ"
        ];

        // 状態管理 (ブラウザのローカルストレージに刻む)
        let usageCount = parseInt(localStorage.getItem('waruUsageCount')) || 0;
        let isUnlimited = localStorage.getItem('waruUnlimited') === 'true'; // お布施済みフラグ

        // DOM Elements
        const imageInput = document.getElementById('imageInput');
        const previewContainer = document.getElementById('preview-container');
        const previewImg = document.getElementById('preview-img');
        const actionArea = document.getElementById('action-area');
        const freeCountSpan = document.getElementById('free-count');
        const btnGenerate = document.getElementById('btn-generate');
        const paymentModal = document.getElementById('payment-modal');

        // UI初期化
        function updateUI() {
            let left = Math.max(0, MAX_FREE_SPINS - usageCount);
            if (isUnlimited) {
                freeCountSpan.textContent = "∞ (無限)";
                freeCountSpan.className = "text-4xl text-yellow-500 mx-2 animate-evil";
            } else {
                freeCountSpan.textContent = left;
            }
        }
        updateUI();

        // 1. 画像アップ（ルクス解放）処理
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                previewImg.src = event.target.result;
                previewContainer.classList.remove('hidden');
                actionArea.classList.remove('hidden');
                document.getElementById('quote-text').style.display = 'none';
                
                setTimeout(() => {
                    window.scrollTo({ top: actionArea.offsetTop - 20, behavior: 'smooth' });
                }, 200);
            };
            reader.readAsDataURL(file);
        });

        // 2. ボタン押下（魂の刻印）処理
        btnGenerate.addEventListener('click', async () => {
            if (!isUnlimited && usageCount >= MAX_FREE_SPINS) {
                // タダ乗り終了。お布施モーダルへ
                showPaymentModal();
                return;
            }

            // 回数カウントアップ
            if (!isUnlimited) {
                usageCount++;
                localStorage.setItem('waruUsageCount', usageCount);
                updateUI();
            }
            executeGeneration();
        });

        // 3. お布施モーダル制御
        function showPaymentModal() {
            paymentModal.classList.remove('hidden');
            setTimeout(() => paymentModal.classList.add('opacity-100'), 10);
        }

        // アドレスをパクる（コピー）機能
        function copyAddress() {
            navigator.clipboard.writeText(MY_LIGHTNING_ADDRESS).then(() => {
                const msg = document.getElementById('copy-msg');
                msg.classList.remove('hidden');
                setTimeout(() => msg.classList.add('hidden'), 3000);
            });
        }

        // 自己申告突破ボタン
        document.getElementById('btn-paid').addEventListener('click', () => {
            // お前を信じるぜ！
            isUnlimited = true;
            localStorage.setItem('waruUnlimited', 'true');
            updateUI();
            
            paymentModal.classList.remove('opacity-100');
            setTimeout(() => {
                paymentModal.classList.add('hidden');
                executeGeneration(); // そのまま生成へ
            }, 300);
        });


        // 4. 極悪・合成処理（html2canvas）
        async function executeGeneration() {
            const quoteEl = document.getElementById('quote-text');
            
            // 名言をランダムチョイス
            const meigen = MEIGEN_LIST[Math.floor(Math.random() * MEIGEN_LIST.length)];
            
            // ギラギラカラーランダム（白 or 金）
            const colorClass = Math.random() > 0.5 ? 'text-color-gold' : 'text-color-white';
            
            // 配置ランダム（縦横もCSSで自動決定）
            const posClasses = ['pos-top', 'pos-bottom', 'pos-left', 'pos-right'];
            const selectedPos = posClasses[Math.floor(Math.random() * posClasses.length)];

            // 要素にセットして表示
            quoteEl.className = `mennaku-text absolute ${selectedPos} ${colorClass}`;
            quoteEl.innerHTML = meigen; 
            quoteEl.style.display = 'block';

            // レンダリング待ち
            await new Promise(resolve => setTimeout(resolve, 300));

            // 魔術（html2canvas）発動
            try {
                // ボタンのテキストを一時的に変えて盛り上げる
                const originalBtnText = btnGenerate.innerHTML;
                btnGenerate.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>降臨中...';

                const canvas = await html2canvas(previewContainer, {
                    scale: 2, // 画質マシマシ
                    useCORS: true,
                    backgroundColor: null,
                    logging: false
                });

                // 結果表示
                const resultDataUrl = canvas.toDataURL('image/png');
                document.getElementById('result-img').src = resultDataUrl;
                
                // ダウンロード設定
                const btnDownload = document.getElementById('btn-download');
                btnDownload.onclick = () => {
                    const link = document.createElement('a');
                    link.download = `datewaru_satoshi_${Date.now()}.png`;
                    link.href = resultDataUrl;
                    link.click();
                };

                // モーダルオープン
                const resultModal = document.getElementById('result-modal');
                resultModal.classList.remove('hidden');
                setTimeout(() => resultModal.classList.add('opacity-100'), 10);

                // ボタン戻す
                btnGenerate.innerHTML = originalBtnText;

            } catch (error) {
                console.error("生成失敗:", error);
                alert("画像がデカすぎるか、何かのエラーだ。別のルクス（画像）で試してくれ。");
                btnGenerate.innerHTML = '<i class="fa-solid fa-fire-flame-curved mr-3"></i>魂の刻印を刻む';
            } finally {
                // プレビューのテキストは隠す
                quoteEl.style.display = 'none';
            }
        }

        // 閉じるボタン
        document.getElementById('btn-close-result').addEventListener('click', () => {
            const modal = document.getElementById('result-modal');
            modal.classList.remove('opacity-100');
            setTimeout(() => modal.classList.add('hidden'), 300);
        });

    </script>
</body>
</html>
